name: Update SFMTA special event iCal

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-ical
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Generate calendar
        run: python scripts/generate_ical.py --output sfmta_special_event_parking.ics

      - name: Commit changes (if any)
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain sfmta_special_event_parking.ics)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sfmta_special_event_parking.ics
            git commit -m "Update SFMTA special event parking iCal"
            git push
          else
            echo "No changes."
          fi

